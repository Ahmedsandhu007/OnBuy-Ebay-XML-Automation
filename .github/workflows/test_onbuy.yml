name: Test OnBuy Auth

on:
  workflow_dispatch:

jobs:
  test-auth:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requests
        run: pip install requests

      - name: Test Authentication
        env:
          ONBUY_CONSUMER_KEY: ${{ secrets.ONBUY_CONSUMER_KEY }}
          ONBUY_SECRET_KEY: ${{ secrets.ONBUY_SECRET_KEY }}
        run: python test_onbuy_auth.py
