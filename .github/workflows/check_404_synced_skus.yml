name: Check Synced-But-404 SKUs (read-only)

on:
  workflow_dispatch:
    inputs:
      skus:
        description: "Comma-separated SKUs to check. Defaults to the two reported on 2026-07-06."
        required: false
        default: ""
      max_pages:
        description: "Optional: how many pages of OnBuy queue history to scan (default 40 = ~2000 entries)"
        required: false
        default: ""

jobs:
  check-404-synced-skus:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check synced-but-404 SKUs
        env:
          ONBUY_USE_SANDBOX: ${{ vars.ONBUY_USE_SANDBOX }}
          ONBUY_CONSUMER_KEY: ${{ secrets.ONBUY_CONSUMER_KEY }}
          ONBUY_SECRET_KEY: ${{ secrets.ONBUY_SECRET_KEY }}
          ONBUY_TEST_CONSUMER_KEY: ${{ secrets.ONBUY_TEST_CONSUMER_KEY }}
          ONBUY_TEST_SECRET_KEY: ${{ secrets.ONBUY_TEST_SECRET_KEY }}
          ONBUY_SELLER_ID: ${{ secrets.ONBUY_SELLER_ID }}
          ONBUY_SITE_ID: ${{ secrets.ONBUY_SITE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHECK_404_SKUS: ${{ github.event.inputs.skus }}
          CHECK_404_MAX_PAGES: ${{ github.event.inputs.max_pages }}
        run: python check_404_synced_skus.py
