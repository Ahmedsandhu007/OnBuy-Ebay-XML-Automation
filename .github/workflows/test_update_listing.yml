name: Test Update Listing

on:
  workflow_dispatch:

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - env:
          ONBUY_CONSUMER_KEY: ${{ secrets.ONBUY_CONSUMER_KEY }}
          ONBUY_SECRET_KEY: ${{ secrets.ONBUY_SECRET_KEY }}
          ONBUY_SELLER_ID: ${{ secrets.ONBUY_SELLER_ID }}
          ONBUY_SITE_ID: ${{ secrets.ONBUY_SITE_ID }}
        run: python test_update_listing.py
