name: Generate OnBuy Feed

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Job-level so the "if:" condition below can read it via the env context -
      # the secrets context is not a recognized named-value inside if: expressions.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          ONBUY_CONSUMER_KEY: ${{ secrets.ONBUY_CONSUMER_KEY }}
          ONBUY_SECRET_KEY: ${{ secrets.ONBUY_SECRET_KEY }}
          ONBUY_SELLER_ID: ${{ secrets.ONBUY_SELLER_ID }}
          ONBUY_SITE_ID: ${{ secrets.ONBUY_SITE_ID }}
          # Off until explicitly turned on - see the comment block in generate_xml.py.
          ONBUY_API_PUSH_ENABLED: ${{ vars.ONBUY_API_PUSH_ENABLED }}
          ONBUY_API_TEST_SKUS: ${{ vars.ONBUY_API_TEST_SKUS }}
          # Set ONBUY_USE_SANDBOX=true (as a repo Variable) to run the whole
          # pipeline against OnBuy's sandbox account before ever touching
          # production - see README.md for the recommended rollout order.
          ONBUY_USE_SANDBOX: ${{ vars.ONBUY_USE_SANDBOX }}
          ONBUY_TEST_CONSUMER_KEY: ${{ secrets.ONBUY_TEST_CONSUMER_KEY }}
          ONBUY_TEST_SECRET_KEY: ${{ secrets.ONBUY_TEST_SECRET_KEY }}
          ALI_APP_KEY: ${{ secrets.ALI_APP_KEY }}
          ALI_APP_SECRET: ${{ secrets.ALI_APP_SECRET }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_FEED_BUCKET: ${{ vars.SUPABASE_FEED_BUCKET }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python generate_xml.py

      # feed.xml is uploaded to Supabase Storage from inside generate_xml.py
      # (see storage.py) once SUPABASE_URL/SUPABASE_SERVICE_KEY secrets exist -
      # that replaces the old "commit feed.xml every 3 hours forever" step,
      # which produced 397 of this repo's ~550 commits and grew it unbounded.
      # Until those two secrets are added, this fallback step keeps the old
      # git-commit behavior running so the hosted feed URL never goes stale -
      # remove this step once Supabase Storage is confirmed working.
      - name: Commit and push XML (fallback - only runs until Supabase secrets are set)
        if: ${{ env.SUPABASE_URL == '' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add feed.xml
          git commit -m "Auto update feed" || echo "No changes"
          git push
