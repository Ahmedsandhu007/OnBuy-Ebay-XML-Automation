name: Backfill OnBuy Status

on:
  schedule:
    - cron: "15 * * * *"   # hourly, offset from the main sync's :00 slot
  workflow_dispatch:

# Shares the main sync workflow's concurrency group: requesting a new OnBuy
# token supersedes the one a still-running sync is using (mass mid-run 401s,
# seen 2026-07-06), so queue behind it instead of overlapping.
concurrency:
  group: onbuy-api
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backfill OPC / Sync Status
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          ONBUY_USE_SANDBOX: ${{ vars.ONBUY_USE_SANDBOX }}
          ONBUY_CONSUMER_KEY: ${{ secrets.ONBUY_CONSUMER_KEY }}
          ONBUY_SECRET_KEY: ${{ secrets.ONBUY_SECRET_KEY }}
          ONBUY_TEST_CONSUMER_KEY: ${{ secrets.ONBUY_TEST_CONSUMER_KEY }}
          ONBUY_TEST_SECRET_KEY: ${{ secrets.ONBUY_TEST_SECRET_KEY }}
          ONBUY_SELLER_ID: ${{ secrets.ONBUY_SELLER_ID }}
          ONBUY_SITE_ID: ${{ secrets.ONBUY_SITE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python backfill_onbuy_status.py
